<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Radar de Ofertas Brasil</title>

<meta name="description" content="Encontre produtos baratos e promoções do Mercado Livre">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ffcc00;
padding:20px;
text-align:center;
}

h1{
margin:0;
}

.top-links{
margin-top:15px;
}

.top-links a{
display:inline-block;
margin:5px;
padding:10px 15px;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.whatsapp{
background:#25D366;
}

.canal{
background:#128C7E;
}

.busca{
margin-top:20px;
}

input{
padding:12px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
background:#3483fa;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.container{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.titulo{
font-size:14px;
height:40px;
overflow:hidden;
margin-top:10px;
}

.preco{
font-size:22px;
color:#00a650;
font-weight:bold;
margin-top:10px;
}

.botao{
display:inline-block;
margin-top:10px;
background:#00a650;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
background:#eee;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<h1>Radar de Ofertas Brasil</h1>

<div class="top-links">

<a class="whatsapp"
href="https://chat.whatsapp.com/C0lutrogA3i4h6I4Y9sVUZ"
target="_blank">

Entrar no Grupo de Ofertas

</a>

<a class="canal"
href="https://whatsapp.com/channel/0029VbBRW91Badmj5je4ey2A"
target="_blank">

Seguir Canal de Ofertas

</a>

</div>

<div class="busca">

<input id="busca" placeholder="Buscar produto...">

<button onclick="buscar()">Buscar</button>

</div>

</header>

<div class="container">

<h2>Ofertas encontradas</h2>

<div id="produtos" class="grid"></div>

</div>

<footer>

Radar de Ofertas Brasil • Comparador de preços

</footer>

<script>

async function buscar(){

let termo = document.getElementById("busca").value;

if(!termo){

alert("Digite um produto");

return;

}

buscarProdutos(termo)

}

async function buscarProdutos(termo){

document.getElementById("produtos").innerHTML =
"Buscando ofertas..."

try{

let url =
"https://api.mercadolibre.com/sites/MLB/search?q="
+ encodeURIComponent(termo)

let resposta = await fetch(url)

let dados = await resposta.json()

let produtos = dados.results

let html = ""

produtos.slice(0,20).forEach(p=>{

let linkAfiliado =
"https://mercadolivre.com/sec/mian7622039?url="
+ p.permalink

html += `

<div class="card">

<img src="${p.thumbnail.replace('http','https')}">

<div class="titulo">

${p.title}

</div>

<div class="preco">

R$ ${p.price}

</div>

<a class="botao"
href="${linkAfiliado}"
target="_blank">

Ver Oferta

</a>

</div>

`

})

document.getElementById("produtos").innerHTML = html

}catch(e){

document.getElementById("produtos").innerHTML =
"Erro ao buscar produtos."

}

}

window.onload = function(){

buscarProdutos("promoção")

}

</script>

</body>
</html>

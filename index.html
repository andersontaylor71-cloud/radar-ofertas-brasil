<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Radar de Ofertas Brasil</title>

<meta name="description" content="Busque ofertas baratas do Mercado Livre e Amazon">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

header{
background:#ffcc00;
padding:20px;
}

h1{
margin:0;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#2e7dff;
color:white;
border:none;
cursor:pointer;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.preco{
font-size:20px;
color:green;
font-weight:bold;
}

.oferta{
display:inline-block;
margin-top:10px;
background:#00a650;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Radar de Ofertas Brasil</h1>

<br>

<input id="busca" placeholder="Buscar produto...">

<button onclick="buscar()">Buscar</button>

</header>

<div id="produtos"></div>

<script>

async function buscar(){

let termo = document.getElementById("busca").value;

let url = "https://api.mercadolibre.com/sites/MLB/search?q=" + termo;

let resposta = await fetch(url);

let dados = await resposta.json();

let produtos = dados.results;

let html = "";

produtos.forEach(produto => {

let linkAfiliado = "https://mercadolivre.com/sec/mian7622039?url=" + produto.permalink;

html += `

<div class="card">

<img src="${produto.thumbnail}">

<h3>${produto.title}</h3>

<p class="preco">R$ ${produto.price}</p>

<a class="oferta" href="${linkAfiliado}" target="_blank">
Ver Oferta
</a>

</div>

`;

});

document.getElementById("produtos").innerHTML = html;

}

</script>

</body>
</html> do site -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ofertas Brasil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#fff159;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:bold;
    font-size:22px;
}

.search-box{
    width:100%;
    max-width:500px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.container{
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.price{
    font-size:20px;
    color:#3483fa;
    font-weight:bold;
}

.buy-btn{
    background:#3483fa;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.buy-btn:hover{
    background:#2968c8;
}
</style>
</head>

<body>

<header>
<div class="logo">Radar de Ofertas Brasil</div>
<input class="search-box" placeholder="Buscar produtos..." id="searchInput">
</header>

<div class="container">
<h2>Resultados da busca</h2>
<div class="products" id="products"></div>
</div>

<script>

const affiliateTag = "mian7622039";

async function searchProducts(query){

    const response = await fetch(
        `https://api.mercadolibre.com/sites/MLB/search?q=${query}`
    );

    const data = await response.json();

    const productsDiv = document.getElementById("products");
    productsDiv.innerHTML = "";

    data.results.forEach(product => {

        const affiliateLink = product.permalink + "?tracking_id=" + affiliateTag;

        productsDiv.innerHTML += `
        <div class="card">
            <img src="${product.thumbnail}">
            <h4>${product.title}</h4>
            <div class="price">R$ ${product.price}</div>
            <button class="buy-btn" onclick="window.open('${affiliateLink}','_blank')">
                Comprar Agora
            </button>
        </div>
        `;
    });
}

document.getElementById("searchInput").addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        searchProducts(this.value);
    }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #search-form {
            margin-bottom: 20px;
        }
        #search {
            padding: 10px;
            width: calc(100% - 120px);
        }
        #search-btn {
            padding: 10px 20px;
        }
        #results {
            display: flex;
            flex-wrap: wrap;
        }
        .product {
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 10px;
            padding: 10px;
            flex: 1 1 calc(25% - 20px);
            box-sizing: border-box;
        }
        .product img {
            max-width: 100%;
        }
        .product a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>
    <h1>Marketplace Product Search</h1>
    <form id="search-form">
        <input type="text" id="search" placeholder="Search for products..." required>
        <button type="submit" id="search-btn">Search</button>
    </form>
    <div id="results"></div>
    <script>
        const form = document.getElementById('search-form');
        const resultsDiv = document.getElementById('results');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const searchTerm = document.getElementById('search').value;
            const response = await fetch(`https://api.mercadolibre.com/sites/MLB/search?q=${encodeURI(searchTerm)}`);
            const data = await response.json();
            displayResults(data.results);
        });

        function displayResults(products) {
            resultsDiv.innerHTML = '';
            products.forEach(product => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product';
                productDiv.innerHTML = `
                    <img src="${product.thumbnail}" alt="${product.title}">
                    <h2>${product.title}</h2>
                    <p>Price: R$ ${product.price}</p>
                    <a href="${product.permalink}?aff=your-affiliate-tracking-id" target="_blank">View Product</a>
                `;
                resultsDiv.appendChild(productDiv);
            });
        }
    </script>
</body>
</html>

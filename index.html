<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ofertas Brasil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:#f3f4f6;
}

/* Header */
header{
    background:#fff159;
    padding:15px;
    position:sticky;
    top:0;
    z-index:1000;
}

.header-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    gap:15px;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:600;
    flex:1;
}

.search{
    flex:2;
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

/* Grid */

.products{
    max-width:1200px;
    margin:30px auto;
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
    padding:10px;
}

.card{
    background:white;
    border-radius:18px;
    padding:15px;
    transition:.3s;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:contain;
}

.title{
    font-size:15px;
    height:45px;
    overflow:hidden;
}

.price{
    font-size:22px;
    color:#3483fa;
    font-weight:600;
    margin:10px 0;
}

.buy{
    width:100%;
    padding:12px;
    border:none;
    background:#3483fa;
    color:white;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

.buy:hover{
    background:#2968c8;
}

</style>
</head>

<body>

<header>
<div class="header-container">
<div class="logo">Radar de Ofertas Brasil</div>
<input class="search" id="searchInput" placeholder="Buscar produtos... e pressione Enter">
</div>
</header>

<div class="products" id="products"></div>

<script>

const affiliateTag = "mian7622039";

async function searchProducts(query){

    const res = await fetch(
        "https://api.mercadolibre.com/sites/MLB/search?q="+encodeURIComponent(query)
    );

    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.results.forEach(p=>{

        const link = p.permalink + "?tracking_id=" + affiliateTag;

        container.innerHTML += `
        <div class="card">
            <img src="${p.thumbnail}">
            <div class="title">${p.title}</div>
            <div class="price">R$ ${p.price}</div>
            <button class="buy" onclick="window.open('${link}','_blank')">
                Comprar Agora
            </button>
        </div>
        `;
    });
}

document.getElementById("searchInput").addEventListener("keyup",function(e){
    if(e.key==="Enter"){
        searchProducts(this.value);
    }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ofertas</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

h1{
color:#ff6600;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

button{
padding:10px 20px;
background:#ff6600;
color:white;
border:none;
cursor:pointer;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.preco{
color:green;
font-size:20px;
font-weight:bold;
}

a{
text-decoration:none;
color:white;
background:#3483fa;
padding:8px;
display:inline-block;
margin-top:10px;
border-radius:5px;
}
</style>

</head>

<body>

<h1>🔥 Radar de Ofertas</h1>

<input id="busca" placeholder="Pesquisar produto">
<button onclick="buscar()">Buscar</button>

<div id="produtos"></div>

<script>

async function buscar(){

let termo = document.getElementById("busca").value

let url = `https://api.mercadolibre.com/sites/MLB/search?q=${termo}`

let resposta = await fetch(url)

let dados = await resposta.json()

let produtos = dados.results

let html = ""

produtos.forEach(p => {

html += `
<div class="card">
<img src="${p.thumbnail}">
<h3>${p.title}</h3>
<p class="preco">R$ ${p.price}</p>
<a href="${p.permalink}" target="_blank">Ver Oferta</a>
</div>
`

})

document.getElementById("produtos").innerHTML = html

}

</script>

</body>
</html>
